<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>GameVault · With Game Images & Add/Edit</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(145deg, #0b0e18 0%, #10131f 100%);
            font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            color: #eef2ff;
            padding: 2rem 1.8rem;
        }

        .app-wrapper {
            max-width: 1600px;
            margin: 0 auto;
        }

        /* Header */
        .gamevault-header {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            flex-wrap: wrap;
            gap: 1rem;
            margin-bottom: 2rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
        }

        .logo-area h1 {
            font-size: 1.9rem;
            font-weight: 700;
            background: linear-gradient(135deg, #d9e2ff, #a87eff);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
        }

        .logo-area p {
            font-size: 0.75rem;
            color: #7f8ea3;
            margin-top: 4px;
        }

        .nav-menu {
            display: flex;
            gap: 0.5rem;
            background: rgba(18, 22, 35, 0.7);
            backdrop-filter: blur(8px);
            padding: 0.5rem;
            border-radius: 60px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .nav-btn {
            background: transparent;
            border: none;
            padding: 0.5rem 1.2rem;
            border-radius: 40px;
            font-weight: 500;
            font-size: 0.9rem;
            color: #b9c3db;
            cursor: pointer;
            transition: 0.2s;
            font-family: inherit;
        }

        .nav-btn.active {
            background: #a87eff;
            color: white;
        }

        .nav-btn:hover:not(.active) {
            background: rgba(168, 126, 255, 0.3);
            color: white;
        }

        /* Controls */
        .controls-panel {
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: center;
            gap: 1.5rem;
            margin-bottom: 2rem;
            background: rgba(12, 16, 28, 0.6);
            backdrop-filter: blur(4px);
            padding: 1rem 1.6rem;
            border-radius: 2rem;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .search-box input {
            width: 280px;
            background: #0f121f;
            border: 1px solid #282e3f;
            border-radius: 60px;
            padding: 0.75rem 1.3rem;
            font-size: 0.9rem;
            color: #f0f3ff;
            transition: all 0.2s;
        }

        .search-box input:focus {
            outline: none;
            border-color: #a87eff;
        }

        .filter-group {
            display: flex;
            gap: 1rem;
        }

        .filter-group select {
            background: #0f121f;
            border: 1px solid #2a2f42;
            padding: 0.6rem 1rem;
            border-radius: 2rem;
            color: #e2e8ff;
            cursor: pointer;
        }

        /* Right-aligned grid */
        .right-aligned-grid {
            display: flex;
            justify-content: flex-end;
        }

        .game-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 330px));
            gap: 1.8rem;
            margin-left: auto;
            margin-right: 0;
            width: 100%;
        }

        @media (max-width: 860px) {
            .right-aligned-grid .game-grid {
                margin-left: 0;
            }
            body {
                padding: 1.2rem;
            }
        }

        /* Game Card with Image */
        .game-card {
            background: #11141f;
            border-radius: 1.5rem;
            overflow: hidden;
            transition: all 0.25s ease;
            border: 1px solid rgba(255, 255, 255, 0.06);
            box-shadow: 0 15px 30px -12px rgba(0, 0, 0, 0.5);
        }

        .game-card:hover {
            transform: translateY(-6px);
            border-color: rgba(168, 126, 255, 0.5);
        }

        .game-image {
            width: 100%;
            height: 160px;
            object-fit: cover;
            background: linear-gradient(135deg, #1a1f2e, #0d1020);
            display: block;
        }

        .card-content {
            padding: 1.2rem 1.2rem 1.3rem;
        }

        .game-title {
            font-size: 1.2rem;
            font-weight: 700;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 0.5rem;
        }

        .badge-difficulty {
            font-size: 0.7rem;
            background: #1e293b;
            padding: 0.2rem 0.6rem;
            border-radius: 30px;
        }

        .game-meta {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
            margin: 0.6rem 0;
            font-size: 0.75rem;
            color: #9aa5c1;
        }

        .game-meta span {
            background: #1a1e2c;
            padding: 0.2rem 0.7rem;
            border-radius: 20px;
        }

        .rating-row {
            display: flex;
            align-items: center;
            gap: 6px;
            flex-wrap: wrap;
            margin: 8px 0;
        }

        .stars {
            color: #f5b042;
            font-size: 0.85rem;
        }

        .rating-value {
            background: #1f253b;
            padding: 2px 8px;
            border-radius: 20px;
            font-size: 0.7rem;
        }

        .game-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 1rem;
            padding-top: 0.7rem;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
        }

        .last-updated {
            font-size: 0.7rem;
            color: #6b779b;
        }

        .action-buttons {
            display: flex;
            gap: 0.6rem;
        }

        .edit-btn, .delete-btn {
            background: none;
            border: none;
            font-size: 0.7rem;
            font-weight: 600;
            padding: 0.3rem 0.8rem;
            border-radius: 40px;
            cursor: pointer;
            transition: 0.2s;
        }

        .edit-btn {
            background: #2d2f42;
            color: #cddbff;
        }

        .delete-btn {
            background: #2c1e2c;
            color: #ffaea3;
        }

        .delete-btn:hover {
            background: #631e1e;
            color: white;
        }

        /* Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(8px);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: #12162a;
            border-radius: 2rem;
            padding: 2rem;
            width: 90%;
            max-width: 500px;
            border: 1px solid rgba(168, 126, 255, 0.3);
        }

        .modal-content h3 {
            margin-bottom: 1.5rem;
            font-size: 1.5rem;
        }

        .modal-content input, .modal-content select {
            width: 100%;
            padding: 0.8rem;
            margin-bottom: 1rem;
            background: #0a0d18;
            border: 1px solid #2a2f42;
            border-radius: 1rem;
            color: white;
            font-family: inherit;
        }

        .modal-buttons {
            display: flex;
            gap: 1rem;
            justify-content: flex-end;
        }

        .modal-buttons button {
            padding: 0.6rem 1.2rem;
            border-radius: 2rem;
            border: none;
            cursor: pointer;
            font-weight: 600;
        }

        .save-btn {
            background: #a87eff;
            color: white;
        }

        .cancel-btn {
            background: #2a2f42;
            color: #ccc;
        }

        .empty-message {
            text-align: center;
            padding: 3rem;
            background: #0c0f1a;
            border-radius: 2rem;
            color: #8f9bb3;
        }

        .section-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 1.5rem;
        }

        .add-game-btn {
            background: #a87eff;
            border: none;
            padding: 0.5rem 1.2rem;
            border-radius: 2rem;
            color: white;
            font-weight: 600;
            cursor: pointer;
        }
    </style>
</head>
<body>
<div class="app-wrapper">
    <div class="gamevault-header">
        <div class="logo-area">
            <h1>🎮 GameVault</h1>
            <p>curate your journey</p>
        </div>
        <div class="nav-menu">
            <button class="nav-btn active" data-view="library">📚 My Library</button>
            <button class="nav-btn" data-view="dashboard">📊 Dashboard</button>
        </div>
    </div>

    <div class="controls-panel">
        <div class="search-box">
            <input type="text" id="searchInput" placeholder="🔍 Search games">
        </div>
        <div class="filter-group">
            <select id="platformFilter">
                <option value="all">All Platforms</option>
                <option value="Mobile">Mobile</option>
                <option value="PC">PC</option>
                <option value="Console">Console</option>
            </select>
            <select id="ratingFilter">
                <option value="all">All Ratings</option>
                <option value="4.5">4.5+ Stars</option>
                <option value="4">4.0+ Stars</option>
            </select>
            <select id="statusFilter">
                <option value="all">All Status</option>
                <option value="Backlog">Backlog</option>
                <option value="Playing">Playing</option>
                <option value="Completed">Completed</option>
            </select>
        </div>
    </div>

    <div class="games-section">
        <div class="section-header">
            <h2>📚 Game Library</h2>
            <button class="add-game-btn" id="openAddModalBtn">+ Add New Game</button>
        </div>
        <div class="right-aligned-grid">
            <div class="game-grid" id="gameGridContainer"></div>
        </div>
    </div>
</div>

<!-- Modal Add/Edit -->
<div id="gameModal" class="modal">
    <div class="modal-content">
        <h3 id="modalTitle">Add New Game</h3>
        <input type="text" id="gameTitle" placeholder="Game Title" autocomplete="off">
        <input type="number" id="gameRating" placeholder="Rating (1-5)" step="0.1" min="0" max="5">
        <input type="text" id="gameDifficulty" placeholder="Difficulty (Easy/Medium/Hard/Expert)">
        <input type="text" id="gameGenre" placeholder="Genre (MOBA/RPG/Action/etc)">
        <select id="gamePlatform">
            <option value="Mobile">Mobile</option>
            <option value="PC">PC</option>
            <option value="Console">Console</option>
        </select>
        <select id="gameStatus">
            <option value="Backlog">Backlog</option>
            <option value="Playing">Playing</option>
            <option value="Completed">Completed</option>
        </select>
        <input type="text" id="gameImage" placeholder="Image URL (direct link) — leave blank for default">
        <div class="modal-buttons">
            <button class="cancel-btn" id="closeModalBtn">Cancel</button>
            <button class="save-btn" id="saveGameBtn">Save Game</button>
        </div>
    </div>
</div>

<script>
    // Game data with IMAGES!
    let gamesData = [
        {
            id: 1,
            title: "League of Legends: Wild Rift",
            rating: 4.5,
            starsCount: 3120,
            difficulty: "Easy",
            genre: "MOBA",
            lastUpdated: "1 day ago",
            platform: "Mobile",
            status: "Backlog",
            ratingValue: 4.5,
            imageUrl: "https://images.unsplash.com/photo-1542751371-adc38448a05e?w=400&h=200&fit=crop"
        },
        {
            id: 2,
            title: "Stellar Horizon",
            rating: 4.8,
            starsCount: 8950,
            difficulty: "Medium",
            genre: "RPG",
            lastUpdated: "3 days ago",
            platform: "PC",
            status: "Playing",
            ratingValue: 4.8,
            imageUrl: "https://images.unsplash.com/photo-1538481199705-c710c4e965fc?w=400&h=200&fit=crop"
        },
        {
            id: 3,
            title: "Cyber Oath",
            rating: 4.2,
            starsCount: 2100,
            difficulty: "Hard",
            genre: "Action",
            lastUpdated: "5 days ago",
            platform: "Console",
            status: "Backlog",
            ratingValue: 4.2,
            imageUrl: "https://images.unsplash.com/photo-1550745165-9bc0b252726f?w=400&h=200&fit=crop"
        },
        {
            id: 4,
            title: "Mystic Echoes",
            rating: 4.9,
            starsCount: 4700,
            difficulty: "Medium",
            genre: "Adventure",
            lastUpdated: "12 hours ago",
            platform: "Mobile",
            status: "Completed",
            ratingValue: 4.9,
            imageUrl: "https://images.unsplash.com/photo-1511512578047-dfb367046420?w=400&h=200&fit=crop"
        },
        {
            id: 5,
            title: "Apex Legends: Mobile",
            rating: 4.3,
            starsCount: 5600,
            difficulty: "Hard",
            genre: "Battle Royale",
            lastUpdated: "2 days ago",
            platform: "Mobile",
            status: "Playing",
            ratingValue: 4.3,
            imageUrl: "https://images.unsplash.com/photo-1542751110-97427bbecf20?w=400&h=200&fit=crop"
        },
        {
            id: 6,
            title: "Elden Ring (Shadow Keep)",
            rating: 4.9,
            starsCount: 28900,
            difficulty: "Expert",
            genre: "Souls-like",
            lastUpdated: "2 weeks ago",
            platform: "Console",
            status: "Backlog",
            ratingValue: 4.9,
            imageUrl: "https://images.unsplash.com/photo-1612287230202-1ff1d85d1bdf?w=400&h=200&fit=crop"
        },
        {
            id: 7,
            title: "Hades II",
            rating: 4.7,
            starsCount: 8450,
            difficulty: "Medium",
            genre: "Roguelite",
            lastUpdated: "6 days ago",
            platform: "PC",
            status: "Playing",
            ratingValue: 4.7,
            imageUrl: "https://images.unsplash.com/photo-1552820728-8b83bb6b773f?w=400&h=200&fit=crop"
        }
    ];

    let nextId = 8;
    let currentEditId = null;

    function renderStars(rating) {
        let starString = '';
        for (let i = 0; i < Math.floor(rating); i++) starString += '★';
        if (rating % 1 >= 0.5) starString += '½';
        while (starString.length < 5) starString += '☆';
        return starString;
    }

    function formatStarsCount(count) {
        return count >= 1000 ? (count/1000).toFixed(1)+'k' : count;
    }

    function filterGames() {
        const searchTerm = document.getElementById('searchInput').value.toLowerCase();
        const platform = document.getElementById('platformFilter').value;
        const ratingFilter = document.getElementById('ratingFilter').value;
        const status = document.getElementById('statusFilter').value;

        return gamesData.filter(game => {
            if (searchTerm && !game.title.toLowerCase().includes(searchTerm)) return false;
            if (platform !== 'all' && game.platform !== platform) return false;
            if (ratingFilter !== 'all' && game.ratingValue < parseFloat(ratingFilter)) return false;
            if (status !== 'all' && game.status !== status) return false;
            return true;
        });
    }

    function renderGameGrid() {
        const filtered = filterGames();
        const container = document.getElementById('gameGridContainer');
        const counter = document.getElementById('gameCounter');
        if (!counter) {
            const header = document.querySelector('.section-header');
            if (!document.getElementById('gameCounter')) {
                const span = document.createElement('span');
                span.id = 'gameCounter';
                span.className = 'game-count';
                header.appendChild(span);
            }
        }
        const counterSpan = document.getElementById('gameCounter');
        if (counterSpan) counterSpan.innerText = `${filtered.length} titles`;

        if (filtered.length === 0) {
            container.innerHTML = `<div class="empty-message">🎮 No games found. Click "Add New Game" to start!</div>`;
            return;
        }

        container.innerHTML = filtered.map(game => `
            <div class="game-card">
                <img class="game-image" src="${game.imageUrl || 'https://via.placeholder.com/400x200?text=Game+Thumbnail'}" 
                     alt="${game.title}" onerror="this.src='https://via.placeholder.com/400x200?text=No+Image'">
                <div class="card-content">
                    <div class="game-title">
                        <h3>${escapeHtml(game.title)}</h3>
                        <span class="badge-difficulty">${game.difficulty}</span>
                    </div>
                    <div class="game-meta">
                        <span>🎮 ${game.platform}</span>
                        <span>🎭 ${game.genre}</span>
                        <span>📌 ${game.status}</span>
                    </div>
                    <div class="rating-row">
                        <div class="stars">${renderStars(game.rating)}</div>
                        <div class="rating-value">${game.rating} out of 5</div>
                        <div class="vote-count">⭐ ${formatStarsCount(game.starsCount)}+</div>
                    </div>
                    <div class="game-footer">
                        <div class="last-updated">🕒 Updated: ${game.lastUpdated}</div>
                        <div class="action-buttons">
                            <button class="edit-btn" data-id="${game.id}">✏️ Edit</button>
                            <button class="delete-btn" data-id="${game.id}">🗑️ Delete</button>
                        </div>
                    </div>
                </div>
            </div>
        `).join('');

        document.querySelectorAll('.edit-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                const id = parseInt(btn.dataset.id);
                openEditModal(id);
            });
        });

        document.querySelectorAll('.delete-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                const id = parseInt(btn.dataset.id);
                if (confirm('Delete this game?')) {
                    gamesData = gamesData.filter(g => g.id !== id);
                    renderGameGrid();
                }
            });
        });
    }

    function openAddModal() {
        currentEditId = null;
        document.getElementById('modalTitle').innerText = 'Add New Game';
        document.getElementById('gameTitle').value = '';
        document.getElementById('gameRating').value = '';
        document.getElementById('gameDifficulty').value = '';
        document.getElementById('gameGenre').value = '';
        document.getElementById('gamePlatform').value = 'Mobile';
        document.getElementById('gameStatus').value = 'Backlog';
        document.getElementById('gameImage').value = '';
        document.getElementById('gameModal').classList.add('active');
    }

    function openEditModal(id) {
        const game = gamesData.find(g => g.id === id);
        if (!game) return;
        currentEditId = id;
        document.getElementById('modalTitle').innerText = 'Edit Game';
        document.getElementById('gameTitle').value = game.title;
        document.getElementById('gameRating').value = game.rating;
        document.getElementById('gameDifficulty').value = game.difficulty;
        document.getElementById('gameGenre').value = game.genre;
        document.getElementById('gamePlatform').value = game.platform;
        document.getElementById('gameStatus').value = game.status;
        document.getElementById('gameImage').value = game.imageUrl || '';
        document.getElementById('gameModal').classList.add('active');
    }

    function saveGame() {
        const title = document.getElementById('gameTitle').value.trim();
        const rating = parseFloat(document.getElementById('gameRating').value);
        const difficulty = document.getElementById('gameDifficulty').value.trim();
        const genre = document.getElementById('gameGenre').value.trim();
        const platform = document.getElementById('gamePlatform').value;
        const status = document.getElementById('gameStatus').value;
        let imageUrl = document.getElementById('gameImage').value.trim();

        if (!title) return alert('Game title required');
        if (isNaN(rating) || rating < 0 || rating > 5) return alert('Rating must be 0-5');

        if (currentEditId === null) {
            // Add new
            const newGame = {
                id: nextId++,
                title: title,
                rating: rating,
                ratingValue: rating,
                starsCount: Math.floor(Math.random() * 5000) + 100,
                difficulty: difficulty || 'Medium',
                genre: genre || 'Adventure',
                lastUpdated: 'Just now',
                platform: platform,
                status: status,
                imageUrl: imageUrl || 'https://images.unsplash.com/photo-1511512578047-dfb367046420?w=400&h=200&fit=crop'
            };
            gamesData.push(newGame);
        } else {
            // Edit existing
            const game = gamesData.find(g => g.id === currentEditId);
            if (game) {
                game.title = title;
                game.rating = rating;
                game.ratingValue = rating;
                game.difficulty = difficulty || game.difficulty;
                game.genre = genre || game.genre;
                game.platform = platform;
                game.status = status;
                if (imageUrl) game.imageUrl = imageUrl;
                game.lastUpdated = 'updated now';
            }
        }
        closeModal();
        renderGameGrid();
    }

    function closeModal() {
        document.getElementById('gameModal').classList.remove('active');
        currentEditId = null;
    }

    function escapeHtml(str) {
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    // Event listeners
    document.getElementById('openAddModalBtn').addEventListener('click', openAddModal);
    document.getElementById('closeModalBtn').addEventListener('click', closeModal);
    document.getElementById('saveGameBtn').addEventListener('click', saveGame);
    document.getElementById('searchInput').addEventListener('input', () => renderGameGrid());
    document.getElementById('platformFilter').addEventListener('change', () => renderGameGrid());
    document.getElementById('ratingFilter').addEventListener('change', () => renderGameGrid());
    document.getElementById('statusFilter').addEventListener('change', () => renderGameGrid());

    // Simple dashboard toggle (just visual)
    document.querySelectorAll('.nav-btn').forEach(btn => {
        btn.addEventListener('click', function() {
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            this.classList.add('active');
            if (this.dataset.view === 'dashboard') {
                alert('📊 Dashboard view: total games = ' + gamesData.length);
            } else {
                renderGameGrid();
            }
        });
    });

    // Add counter span
    const headerDiv = document.querySelector('.section-header');
    const counterSpan = document.createElement('span');
    counterSpan.id = 'gameCounter';
    counterSpan.className = 'game-count';
    headerDiv.appendChild(counterSpan);

    renderGameGrid();
</script>
</body>
</html>
