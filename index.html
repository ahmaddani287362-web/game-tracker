<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
    <meta name="theme-color" content="#8b5cf6">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
	
	<!-- ✅ LINK MANIFEST (WAJIB) -->
	<link rel="manifest" href="manifest.json">
	
	 <!-- ✅ ICON UNTUK IPHONE (OPSIONAL TAPI DISARANKAN) -->
    <link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎮</text></svg>">
	
    <title>GameVault | Premium Game Tracker</title>
    
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Tailwind Custom Config -->
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        'sans': ['Inter', 'Plus Jakarta Sans', 'system-ui', 'sans-serif'],
                    },
                    animation: {
                        'shimmer': 'shimmer 1.5s infinite',
                        'fade-in': 'fadeIn 0.4s ease-out',
                        'slide-up': 'slideUp 0.3s ease-out',
                        'pulse-glow': 'pulseGlow 2s infinite',
                    },
                    keyframes: {
                        shimmer: {
                            '0%': { backgroundPosition: '200% 0' },
                            '100%': { backgroundPosition: '-200% 0' },
                        },
                        fadeIn: {
                            '0%': { opacity: '0', transform: 'translateY(10px)' },
                            '100%': { opacity: '1', transform: 'translateY(0)' },
                        },
                        slideUp: {
                            '0%': { transform: 'translateY(100%)' },
                            '100%': { transform: 'translateY(0)' },
                        },
                        pulseGlow: {
                            '0%, 100%': { boxShadow: '0 0 0 0 rgba(139, 92, 246, 0.4)' },
                            '50%': { boxShadow: '0 0 0 8px rgba(139, 92, 246, 0)' },
                        },
                    },
                }
            }
        }
    </script>
    
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    
    <!-- Supabase -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.0/dist/umd/supabase.min.js"></script>
    
    <style>
        /* Custom CSS untuk efek yang tidak tersedia di Tailwind */
        .glass-card {
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .dark .glass-card {
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
        
        /* Shimmer Effect untuk Skeleton Loading */
        .shimmer {
            background: linear-gradient(90deg, rgba(255,255,255,0) 0%, rgba(255,255,255,0.1) 50%, rgba(255,255,255,0) 100%);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite;
        }
        
        @keyframes shimmer {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }
        
        /* Custom Scrollbar */
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }
        
        ::-webkit-scrollbar-track {
            background: rgba(139, 92, 246, 0.1);
            border-radius: 10px;
        }
        
        ::-webkit-scrollbar-thumb {
            background: linear-gradient(135deg, #8b5cf6, #a855f7);
            border-radius: 10px;
        }
        
        /* Hide scrollbar for mobile but keep functionality */
        @media (max-width: 768px) {
            ::-webkit-scrollbar {
                width: 0px;
            }
        }
        
        /* Smooth transitions */
        * {
            transition: all 0.2s ease;
        }
        
        /* Prevent horizontal scroll */
        body {
            overflow-x: hidden;
        }
        
        /* Bottom Navigation untuk Mobile */
        .bottom-nav {
            transition: transform 0.3s ease;
        }
        
        /* Touch-friendly tap targets */
        .tap-target {
            min-height: 44px;
            min-width: 44px;
        }
        
        /* Gradient borders */
        .gradient-border {
            position: relative;
            background: linear-gradient(135deg, rgba(139, 92, 246, 0.3), rgba(236, 72, 153, 0.3));
            border-radius: 20px;
        }
        
        /* Loading spinner */
        .loading-spinner {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(139, 92, 246, 0.2);
            border-top-color: #8b5cf6;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        /* Chart container responsive */
        .chart-container {
            position: relative;
            width: 100%;
            aspect-ratio: 4 / 3;
        }
        
        /* Game card hover effect */
        .game-card {
            transition: transform 0.3s cubic-bezier(0.2, 0.9, 0.4, 1.1), box-shadow 0.3s ease;
        }
        
        .game-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 25px 40px -12px rgba(0, 0, 0, 0.25);
        }
        
        /* Image fallback pattern */
        .image-fallback {
            background: linear-gradient(135deg, #1e1b2e, #2d2a4a);
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        /* Modal bottom sheet untuk mobile */
        @media (max-width: 768px) {
            .modal-content {
                position: fixed;
                bottom: 0;
                left: 0;
                right: 0;
                border-radius: 28px 28px 0 0;
                animation: slideUp 0.3s ease-out;
            }
            
            @keyframes slideUp {
                from { transform: translateY(100%); }
                to { transform: translateY(0); }
            }
        }
    </style>
</head>
<body class="bg-gray-50 dark:bg-gray-900 font-sans antialiased transition-colors duration-300 overflow-x-hidden">
    
    <!-- Desktop Sidebar -->
    <aside class="fixed left-0 top-0 h-full w-72 bg-white/80 dark:bg-gray-900/80 backdrop-blur-xl border-r border-gray-200 dark:border-gray-800 z-20 hidden md:flex flex-col">
        <div class="p-6 border-b border-gray-200 dark:border-gray-800">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 rounded-2xl bg-gradient-to-br from-purple-500 to-pink-500 flex items-center justify-center shadow-lg">
                    <i class="fas fa-dice-d6 text-white text-xl"></i>
                </div>
                <span class="text-xl font-bold bg-gradient-to-r from-purple-600 to-pink-600 bg-clip-text text-transparent">GameVault</span>
            </div>
        </div>
        
        <nav class="flex-1 p-4 space-y-2">
            <a href="#" data-tab="dashboard" class="nav-link flex items-center gap-3 px-4 py-3 rounded-xl text-gray-600 dark:text-gray-400 hover:bg-purple-50 dark:hover:bg-purple-900/20 transition-all">
                <i class="fas fa-chart-pie w-5"></i>
                <span>Dashboard</span>
            </a>
            <a href="#" data-tab="library" class="nav-link flex items-center gap-3 px-4 py-3 rounded-xl text-gray-600 dark:text-gray-400 hover:bg-purple-50 dark:hover:bg-purple-900/20 transition-all">
                <i class="fas fa-gamepad w-5"></i>
                <span>My Library</span>
            </a>
        </nav>
        
        <div class="p-4 border-t border-gray-200 dark:border-gray-800">
            <div class="flex items-center justify-between px-4 py-2 bg-gray-100 dark:bg-gray-800 rounded-xl">
                <i class="fas fa-moon text-gray-500"></i>
                <label class="relative inline-flex items-center cursor-pointer">
                    <input type="checkbox" id="darkModeToggle" class="sr-only peer">
                    <div class="w-11 h-6 bg-gray-300 peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-purple-600"></div>
                </label>
                <i class="fas fa-sun text-gray-500"></i>
            </div>
        </div>
    </aside>
    
    <!-- Main Content -->
    <main class="md:ml-72 min-h-screen pb-24 md:pb-8">
        <!-- Header -->
        <header class="sticky top-0 z-10 bg-white/80 dark:bg-gray-900/80 backdrop-blur-xl border-b border-gray-200 dark:border-gray-800 px-4 py-4 md:px-8">
            <div class="flex justify-between items-center">
                <h1 id="pageTitle" class="text-2xl md:text-3xl font-bold bg-gradient-to-r from-gray-800 to-gray-600 dark:from-white dark:to-gray-300 bg-clip-text text-transparent">Dashboard</h1>
                <button id="addGameBtn" class="tap-target hidden md:flex items-center gap-2 px-5 py-2.5 bg-gradient-to-r from-purple-600 to-pink-600 text-white rounded-xl font-semibold hover:shadow-lg hover:shadow-purple-500/25 transition-all">
                    <i class="fas fa-plus"></i>
                    <span>Add Game</span>
                </button>
            </div>
        </header>
        
        <div class="p-4 md:p-8">
            <!-- Dashboard Section -->
            <section id="dashboardSection" class="space-y-6">
                <!-- Stats Grid -->
                <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
                    <div class="glass-card rounded-2xl p-4 md:p-6">
                        <div class="flex items-center gap-3">
                            <div class="w-10 h-10 rounded-xl bg-purple-100 dark:bg-purple-900/30 flex items-center justify-center">
                                <i class="fas fa-gamepad text-purple-600 dark:text-purple-400 text-xl"></i>
                            </div>
                            <div>
                                <p class="text-xs text-gray-500 dark:text-gray-400 uppercase tracking-wide">Total Games</p>
                                <p id="totalGames" class="text-2xl md:text-3xl font-bold">0</p>
                            </div>
                        </div>
                    </div>
                    <div class="glass-card rounded-2xl p-4 md:p-6">
                        <div class="flex items-center gap-3">
                            <div class="w-10 h-10 rounded-xl bg-emerald-100 dark:bg-emerald-900/30 flex items-center justify-center">
                                <i class="fas fa-trophy text-emerald-600 dark:text-emerald-400 text-xl"></i>
                            </div>
                            <div>
                                <p class="text-xs text-gray-500 dark:text-gray-400 uppercase tracking-wide">Completed</p>
                                <p id="completedGames" class="text-2xl md:text-3xl font-bold">0</p>
                            </div>
                        </div>
                    </div>
                    <div class="glass-card rounded-2xl p-4 md:p-6">
                        <div class="flex items-center gap-3">
                            <div class="w-10 h-10 rounded-xl bg-blue-100 dark:bg-blue-900/30 flex items-center justify-center">
                                <i class="fas fa-clock text-blue-600 dark:text-blue-400 text-xl"></i>
                            </div>
                            <div>
                                <p class="text-xs text-gray-500 dark:text-gray-400 uppercase tracking-wide">Total Hours</p>
                                <p id="totalHours" class="text-2xl md:text-3xl font-bold">0</p>
                            </div>
                        </div>
                    </div>
                    <div class="glass-card rounded-2xl p-4 md:p-6">
                        <div class="flex items-center gap-3">
                            <div class="w-10 h-10 rounded-xl bg-amber-100 dark:bg-amber-900/30 flex items-center justify-center">
                                <i class="fas fa-star text-amber-600 dark:text-amber-400 text-xl"></i>
                            </div>
                            <div>
                                <p class="text-xs text-gray-500 dark:text-gray-400 uppercase tracking-wide">Avg Rating</p>
                                <p id="avgRating" class="text-2xl md:text-3xl font-bold">0.0</p>
                            </div>
                        </div>
                    </div>
                </div>
                
                <!-- Charts Row - 2 Columns Symmetric -->
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div class="glass-card rounded-2xl p-6">
                        <h4 class="text-sm font-semibold text-gray-600 dark:text-gray-400 mb-4">Top Genres</h4>
                        <div class="chart-container">
                            <canvas id="genreChart"></canvas>
                        </div>
                    </div>
                    <div class="glass-card rounded-2xl p-6">
                        <h4 class="text-sm font-semibold text-gray-600 dark:text-gray-400 mb-4">Completion Status</h4>
                        <div class="chart-container">
                            <canvas id="completionChart"></canvas>
                        </div>
                    </div>
                    <div class="glass-card rounded-2xl p-6 md:col-span-2">
                        <h4 class="text-sm font-semibold text-gray-600 dark:text-gray-400 mb-4">Rating Distribution</h4>
                        <div class="chart-container">
                            <canvas id="ratingChart"></canvas>
                        </div>
                    </div>
                </div>
            </section>
            
            <!-- Library Section -->
            <section id="librarySection" class="space-y-6 hidden">
                <!-- Filter Bar -->
                <div class="glass-card rounded-2xl p-4 flex flex-wrap gap-3">
                    <div class="flex-1 min-w-[200px]">
                        <div class="relative">
                            <i class="fas fa-search absolute left-3 top-1/2 -translate-y-1/2 text-gray-400 text-sm"></i>
                            <input type="text" id="searchInput" placeholder="Search games..." class="w-full pl-10 pr-4 py-2.5 bg-gray-100 dark:bg-gray-800 border-0 rounded-xl focus:ring-2 focus:ring-purple-500 transition-all">
                        </div>
                    </div>
                    <select id="filterGenre" class="px-4 py-2.5 bg-gray-100 dark:bg-gray-800 border-0 rounded-xl focus:ring-2 focus:ring-purple-500">
                        <option value="">All Genres</option>
                    </select>
                    <select id="filterPlatform" class="px-4 py-2.5 bg-gray-100 dark:bg-gray-800 border-0 rounded-xl focus:ring-2 focus:ring-purple-500">
                        <option value="">All Platforms</option>
                    </select>
                    <select id="filterRating" class="px-4 py-2.5 bg-gray-100 dark:bg-gray-800 border-0 rounded-xl focus:ring-2 focus:ring-purple-500">
                        <option value="">All Ratings</option>
                        <option value="5">5★ Only</option>
                        <option value="4">4★ & Up</option>
                        <option value="3">3★ & Up</option>
                    </select>
                    <select id="filterStatus" class="px-4 py-2.5 bg-gray-100 dark:bg-gray-800 border-0 rounded-xl focus:ring-2 focus:ring-purple-500">
                        <option value="">All Status</option>
                        <option value="completed">Completed</option>
                        <option value="playing">Playing</option>
                        <option value="backlog">Backlog</option>
                    </select>
                </div>
                
                <!-- Games Grid - Responsive 2 columns on mobile -->
                <div id="gamesGrid" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 xl:grid-cols-5 gap-4 md:gap-6">
                    <!-- Game cards will be inserted here -->
                </div>
            </section>
        </div>
    </main>
    
    <!-- Bottom Navigation (Mobile Only) -->
    <div class="bottom-nav fixed bottom-0 left-0 right-0 bg-white/90 dark:bg-gray-900/90 backdrop-blur-xl border-t border-gray-200 dark:border-gray-800 md:hidden z-30">
        <div class="flex justify-around items-center py-2">
            <button data-tab="dashboard" class="nav-item-mobile flex flex-col items-center gap-1 px-4 py-2 rounded-xl transition-all">
                <i class="fas fa-chart-pie text-xl"></i>
                <span class="text-xs">Stats</span>
            </button>
            <button id="mobileAddBtn" class="flex flex-col items-center gap-1 px-5 py-2 -mt-6 bg-gradient-to-r from-purple-600 to-pink-600 rounded-2xl shadow-lg shadow-purple-500/30">
                <i class="fas fa-plus text-white text-xl"></i>
                <span class="text-white text-xs">Add</span>
            </button>
            <button data-tab="library" class="nav-item-mobile flex flex-col items-center gap-1 px-4 py-2 rounded-xl transition-all">
                <i class="fas fa-gamepad text-xl"></i>
                <span class="text-xs">Library</span>
            </button>
        </div>
    </div>
    
    <!-- Modal Add/Edit Game (Bottom Sheet on Mobile) -->
    <div id="gameModal" class="fixed inset-0 bg-black/50 backdrop-blur-sm z-50 hidden items-end md:items-center justify-center">
        <div class="modal-content bg-white dark:bg-gray-900 w-full md:max-w-lg md:rounded-2xl max-h-[90vh] overflow-y-auto">
            <div class="sticky top-0 bg-white dark:bg-gray-900 border-b border-gray-200 dark:border-gray-800 p-4 flex justify-between items-center">
                <h3 id="modalTitle" class="text-xl font-bold">Add New Game</h3>
                <button class="close-modal w-8 h-8 rounded-full bg-gray-100 dark:bg-gray-800 flex items-center justify-center">
                    <i class="fas fa-times text-gray-500"></i>
                </button>
            </div>
            <div class="p-4">
                <!-- Search from RAWG -->
                <div class="relative mb-4">
                    <i class="fas fa-search absolute left-3 top-1/2 -translate-y-1/2 text-gray-400"></i>
                    <input type="text" id="gameSearchInput" placeholder="Search game from RAWG..." class="w-full pl-10 pr-4 py-3 bg-gray-100 dark:bg-gray-800 rounded-xl border-0 focus:ring-2 focus:ring-purple-500">
                    <div id="searchResults" class="absolute top-full left-0 right-0 mt-2 bg-white dark:bg-gray-800 rounded-xl shadow-xl border border-gray-200 dark:border-gray-700 max-h-64 overflow-y-auto z-10 hidden"></div>
                </div>
                <div class="text-center text-gray-400 text-sm mb-4">— OR —</div>
                <form id="gameForm">
                    <input type="hidden" id="gameId">
                    <div class="mb-4">
                        <label class="block text-sm font-medium mb-1">Game Title *</label>
                        <input type="text" id="title" required class="w-full px-4 py-3 bg-gray-100 dark:bg-gray-800 rounded-xl border-0 focus:ring-2 focus:ring-purple-500">
                    </div>
                    <div id="coverPreviewContainer" class="mb-4 hidden">
                        <img id="coverPreview" class="w-full h-40 object-cover rounded-xl">
                    </div>
                    <div class="grid grid-cols-2 gap-3 mb-4">
                        <div>
                            <label class="block text-sm font-medium mb-1">Platform</label>
                            <input type="text" id="platform" class="w-full px-4 py-3 bg-gray-100 dark:bg-gray-800 rounded-xl border-0">
                        </div>
                        <div>
                            <label class="block text-sm font-medium mb-1">Genre</label>
                            <input type="text" id="genre" class="w-full px-4 py-3 bg-gray-100 dark:bg-gray-800 rounded-xl border-0">
                        </div>
                    </div>
                    <div class="mb-4">
                        <label class="block text-sm font-medium mb-1">Tags (comma)</label>
                        <input type="text" id="tags" class="w-full px-4 py-3 bg-gray-100 dark:bg-gray-800 rounded-xl border-0">
                    </div>
                    <div class="grid grid-cols-3 gap-3 mb-4">
                        <div>
                            <label class="block text-sm font-medium mb-1">Progress</label>
                            <input type="number" id="progress" min="0" max="100" value="0" class="w-full px-4 py-3 bg-gray-100 dark:bg-gray-800 rounded-xl border-0">
                        </div>
                        <div>
                            <label class="block text-sm font-medium mb-1">Rating</label>
                            <input type="number" id="rating" step="0.5" min="1" max="5" value="3" class="w-full px-4 py-3 bg-gray-100 dark:bg-gray-800 rounded-xl border-0">
                        </div>
                        <div>
                            <label class="block text-sm font-medium mb-1">Hours</label>
                            <input type="number" id="hours_played" step="0.5" value="0" class="w-full px-4 py-3 bg-gray-100 dark:bg-gray-800 rounded-xl border-0">
                        </div>
                    </div>
                    <div class="mb-6">
                        <label class="block text-sm font-medium mb-1">Status</label>
                        <select id="status" class="w-full px-4 py-3 bg-gray-100 dark:bg-gray-800 rounded-xl border-0">
                            <option value="backlog">📚 Backlog</option>
                            <option value="playing">🎮 Playing</option>
                            <option value="completed">🏆 Completed</option>
                        </select>
                    </div>
                    <button type="submit" class="w-full py-3 bg-gradient-to-r from-purple-600 to-pink-600 text-white rounded-xl font-semibold hover:shadow-lg transition-all">
                        <i class="fas fa-save mr-2"></i> Save Game
                    </button>
                </form>
            </div>
        </div>
    </div>
    
    <!-- Delete Confirmation Modal -->
    <div id="deleteModal" class="fixed inset-0 bg-black/50 backdrop-blur-sm z-50 hidden items-center justify-center">
        <div class="bg-white dark:bg-gray-900 rounded-2xl p-6 max-w-sm w-full mx-4">
            <div class="text-center">
                <div class="w-16 h-16 mx-auto mb-4 rounded-full bg-red-100 dark:bg-red-900/30 flex items-center justify-center">
                    <i class="fas fa-trash-alt text-red-500 text-2xl"></i>
                </div>
                <h3 class="text-xl font-bold mb-2">Delete Game?</h3>
                <p class="text-gray-500 dark:text-gray-400 mb-6">This action cannot be undone.</p>
                <div class="flex gap-3">
                    <button id="cancelDeleteBtn" class="flex-1 py-3 bg-gray-100 dark:bg-gray-800 rounded-xl font-medium">Cancel</button>
                    <button id="confirmDeleteBtn" class="flex-1 py-3 bg-red-500 text-white rounded-xl font-medium">Delete</button>
                </div>
            </div>
        </div>
    </div>
    
    <!-- Game Detail Modal -->
    <div id="detailModal" class="fixed inset-0 bg-black/80 backdrop-blur-md z-50 hidden items-center justify-center">
        <div class="bg-white dark:bg-gray-900 rounded-2xl max-w-2xl w-full mx-4 max-h-[85vh] overflow-y-auto">
            <div id="detailHero" class="h-48 bg-cover bg-center rounded-t-2xl relative">
                <button class="close-modal absolute top-4 right-4 w-10 h-10 rounded-full bg-black/50 flex items-center justify-center text-white">
                    <i class="fas fa-times"></i>
                </button>
            </div>
            <div id="detailContent" class="p-6"></div>
        </div>
    </div>
