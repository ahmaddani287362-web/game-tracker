<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>GameVault | Epic-Style Game Tracker</title>
    
    <!-- PWA Manifest (embedded) -->
    <link rel="manifest" href="data:application/manifest+json,{%22name%22:%22GameVault%20-%20Game%20Tracker%22,%22short_name%22:%22GameVault%22,%22description%22:%22Track%20your%20gaming%20journey%22,%22start_url%22:%22/%22,%22display%22:%22standalone%22,%22theme_color%22:%22#0078f0%22,%22background_color%22:%220a0a0a%22,%22icons%22:[{%22src%22:%22https://placehold.co/192x192/0078f0/white?text=G%22,%22sizes%22:%22192x192%22,%22type%22:%22image/png%22},{%22src%22:%22https://placehold.co/512x512/0078f0/white?text=G%22,%22sizes%22:%22512x512%22,%22type%22:%22image/png%22}]}">
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎮</text></svg>">
    
    <!-- Fonts & Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Libraries -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.0/dist/umd/supabase.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-primary: #121212;
            --bg-secondary: #1a1a1a;
            --card-bg: #202020;
            --card-hover: #2a2a2a;
            --text-primary: #ffffff;
            --text-secondary: #b0b0b0;
            --border: #2a2a2a;
            --accent: #0078f0;
            --accent-hover: #0060c0;
            --success: #10b981;
            --danger: #ef4444;
            --sidebar-bg: #0a0a0a;
            --shadow: 0 20px 35px -10px rgba(0,0,0,0.3);
            --epic-blue: #0078f0;
            --epic-dark: #0a0a0a;
        }

        .dark-mode {
            --bg-primary: #0a0a0a;
            --bg-secondary: #121212;
            --card-bg: #1a1a1a;
            --text-primary: #ffffff;
            --text-secondary: #a0a0a0;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            transition: all 0.3s ease;
        }

        .app-container {
            display: flex;
            min-height: 100vh;
        }

        .sidebar {
            width: 260px;
            background: var(--sidebar-bg);
            padding: 2rem 1rem;
            display: flex;
            flex-direction: column;
            gap: 2rem;
            position: fixed;
            top: 0;
            left: 0;
            bottom: 0;
            z-index: 10;
            backdrop-filter: blur(10px);
            border-right: 1px solid rgba(255,255,255,0.05);
        }

        .logo-area {
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 1.5rem;
            font-weight: 700;
            color: white;
            padding: 0 1rem;
        }

        .logo-area i {
            font-size: 2rem;
            color: var(--accent);
        }

        .nav-menu {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .nav-link {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 20px;
            border-radius: 12px;
            color: var(--text-secondary);
            transition: all 0.3s;
            text-decoration: none;
            cursor: pointer;
            font-weight: 500;
        }

        .nav-link:hover, .nav-link.active {
            background: var(--accent);
            color: white;
        }

        .main-content {
            flex: 1;
            margin-left: 260px;
            padding: 2rem;
            min-height: 100vh;
        }

        .bottom-nav {
            display: none;
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: var(--bg-secondary);
            border-top: 1px solid var(--border);
            padding: 10px 20px;
            padding-bottom: calc(10px + env(safe-area-inset-bottom));
            z-index: 100;
            justify-content: space-around;
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            background: none;
            border: none;
            cursor: pointer;
            color: var(--text-secondary);
            padding: 8px 16px;
            border-radius: 40px;
            font-size: 0.7rem;
        }

        .nav-item i { font-size: 1.4rem; }
        .nav-item.active { color: var(--accent); background: rgba(0, 120, 240, 0.15); }
        .nav-item.fab {
            background: var(--accent);
            color: white;
            padding: 12px 20px;
            border-radius: 50px;
            margin-top: -20px;
        }

        .content-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .content-header h1 {
            font-size: 2rem;
            font-weight: 700;
            background: linear-gradient(135deg, #ffffff, var(--accent));
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .btn-primary {
            background: var(--accent);
            border: none;
            padding: 12px 28px;
            border-radius: 40px;
            color: white;
            font-weight: 600;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            transition: all 0.3s;
        }

        .btn-primary:hover {
            background: var(--accent-hover);
            transform: translateY(-2px);
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1.5rem;
            margin-bottom: 2rem;
        }

        .stat-card {
            background: var(--card-bg);
            padding: 1.5rem;
            border-radius: 20px;
            display: flex;
            align-items: center;
            gap: 1rem;
            border: 1px solid var(--border);
            transition: all 0.3s;
        }

        .stat-card:hover {
            transform: translateY(-5px);
            border-color: var(--accent);
        }

        .stat-card i {
            font-size: 2rem;
            color: var(--accent);
        }

        .charts-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 1.5rem;
            margin-bottom: 2rem;
        }

        .chart-card {
            background: var(--card-bg);
            border-radius: 20px;
            padding: 1.5rem;
            border: 1px solid var(--border);
        }

        .filter-bar {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin-bottom: 2rem;
            background: var(--card-bg);
            padding: 1rem;
            border-radius: 60px;
            border: 1px solid var(--border);
        }

        .search-box {
            flex: 1;
            display: flex;
            align-items: center;
            gap: 10px;
            background: var(--bg-primary);
            padding: 8px 16px;
            border-radius: 40px;
            border: 1px solid var(--border);
        }

        .search-box input {
            flex: 1;
            background: none;
            border: none;
            outline: none;
            color: var(--text-primary);
        }

        select {
            background: var(--bg-primary);
            border: 1px solid var(--border);
            padding: 8px 20px;
            border-radius: 40px;
            color: var(--text-primary);
            cursor: pointer;
        }

        .games-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 2rem;
        }

        .game-card {
            background: var(--card-bg);
            border-radius: 16px;
            overflow: hidden;
            transition: all 0.3s;
            cursor: pointer;
            position: relative;
        }

        .game-card:hover {
            transform: translateY(-8px);
            background: var(--card-hover);
        }

        .game-cover {
            position: relative;
            height: 200px;
            overflow: hidden;
        }

        .game-cover img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.3s;
        }

        .game-card:hover .game-cover img {
            transform: scale(1.05);
        }

        .free-badge {
            position: absolute;
            top: 12px;
            left: 12px;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(4px);
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.7rem;
            font-weight: 600;
            color: #00d4ff;
            z-index: 2;
        }

        .progress-overlay {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: rgba(0,0,0,0.5);
        }

        .progress-fill {
            height: 100%;
            background: var(--accent);
            transition: width 0.3s;
        }

        .card-content {
            padding: 1rem;
        }

        .game-title {
            font-size: 1rem;
            font-weight: 700;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 0.5rem;
        }

        .rating-stars i {
            color: #fbbf24;
            font-size: 0.75rem;
        }

        .game-meta {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin: 10px 0;
        }

        .tag {
            background: var(--bg-primary);
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 0.65rem;
            color: var(--text-secondary);
        }

        .card-actions {
            display: flex;
            justify-content: flex-end;
            gap: 12px;
            margin-top: 10px;
            padding-top: 10px;
            border-top: 1px solid var(--border);
        }

        .card-actions button {
            background: none;
            border: none;
            cursor: pointer;
            color: var(--text-secondary);
            padding: 6px 12px;
            border-radius: 8px;
            font-size: 0.75rem;
            transition: all 0.2s;
        }

        .card-actions button:hover {
            color: var(--accent);
            background: rgba(0, 120, 240, 0.1);
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(8px);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .modal-content {
            background: var(--bg-secondary);
            border-radius: 24px;
            max-width: 550px;
            width: 90%;
            padding: 2rem;
            max-height: 85vh;
            overflow-y: auto;
            border: 1px solid var(--border);
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
        }

        .close-modal {
            font-size: 2rem;
            cursor: pointer;
            transition: color 0.2s;
        }

        .close-modal:hover {
            color: var(--accent);
        }

        .form-group {
            margin-bottom: 1rem;
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
        }

        label {
            font-weight: 500;
            display: block;
            margin-bottom: 6px;
            font-size: 0.85rem;
            color: var(--text-secondary);
        }

        input, select {
            width: 100%;
            padding: 12px;
            border-radius: 16px;
            border: 1px solid var(--border);
            background: var(--bg-primary);
            color: var(--text-primary);
            font-family: inherit;
        }

        input:focus, select:focus {
            outline: none;
            border-color: var(--accent);
        }

        .dark-mode-toggle {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-top: auto;
            color: white;
            padding: 1rem;
            background: rgba(255,255,255,0.05);
            border-radius: 30px;
        }

        .switch {
            position: relative;
            display: inline-block;
            width: 52px;
            height: 26px;
        }

        .switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }

        .slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: #444;
            border-radius: 34px;
            transition: 0.3s;
        }

        .slider:before {
            position: absolute;
            content: "";
            height: 20px;
            width: 20px;
            left: 3px;
            bottom: 3px;
            background-color: white;
            border-radius: 50%;
            transition: 0.3s;
        }

        input:checked + .slider {
            background: var(--accent);
        }

        input:checked + .slider:before {
            transform: translateX(26px);
        }

        .search-results {
            position: absolute;
            top: 100%;
            left: 0;
            right: 0;
            max-height: 300px;
            overflow-y: auto;
            background: var(--bg-secondary);
            border-radius: 20px;
            border: 1px solid var(--border);
            z-index: 1000;
            display: none;
        }

        .search-result-item {
            display: flex;
            align-items: center;
            gap: 15px;
            padding: 12px;
            cursor: pointer;
            border-bottom: 1px solid var(--border);
            transition: background 0.2s;
        }

        .search-result-item:hover {
            background: var(--accent);
            color: white;
        }

        .search-result-item img {
            width: 50px;
            height: 50px;
            object-fit: cover;
            border-radius: 12px;
        }

        .section {
            display: none;
        }

        .section.active {
            display: block;
        }

        .empty-state {
            text-align: center;
            padding: 4rem;
            background: var(--card-bg);
            border-radius: 28px;
        }

        .notification {
            position: fixed;
            bottom: 30px;
            right: 30px;
            padding: 12px 24px;
            border-radius: 12px;
            color: white;
            z-index: 10000;
            display: none;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from {
                transform: translateX(100%);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }

        .notification.success {
            background: linear-gradient(135deg, #10b981, #059669);
        }

        .notification.error {
            background: linear-gradient(135deg, #ef4444, #dc2626);
        }

        .cover-preview {
            width: 100%;
            height: 150px;
            object-fit: cover;
            border-radius: 16px;
            margin-bottom: 1rem;
        }

        @media (max-width: 768px) {
            .sidebar {
                display: none;
            }

            .main-content {
                margin-left: 0;
                padding: 1rem;
                padding-bottom: 80px;
            }

            .bottom-nav {
                display: flex;
            }

            .stats-grid {
                grid-template-columns: 1fr 1fr;
                gap: 1rem;
            }

            .games-grid {
                grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
                gap: 1rem;
            }

            .game-cover {
                height: 140px;
            }

            .game-title {
                font-size: 0.85rem;
            }

            .form-row {
                grid-template-columns: 1fr;
            }

            .filter-bar {
                flex-direction: column;
                border-radius: 20px;
            }

            .search-box {
                width: 100%;
            }

            select {
                width: 100%;
            }
        }

        @media (min-width: 769px) {
            .mobile-only {
                display: none;
            }
        }

        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }

        ::-webkit-scrollbar-track {
            background: var(--bg-primary);
        }

        ::-webkit-scrollbar-thumb {
            background: var(--accent);
            border-radius: 10px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: var(--accent-hover);
        }
    </style>
</head>
<body>
<div class="app-container">
    <aside class="sidebar">
        <div class="logo-area">
            <i class="fas fa-dice-d6"></i>
            <span>GameVault</span>
        </div>
        <nav class="nav-menu">
            <a class="nav-link active" data-tab="dashboard">
                <i class="fas fa-chart-pie"></i>
                <span>Dashboard</span>
            </a>
            <a class="nav-link" data-tab="library">
                <i class="fas fa-gamepad"></i>
                <span>My Library</span>
            </a>
        </nav>
        <div class="dark-mode-toggle">
            <i class="fas fa-moon"></i>
            <label class="switch">
                <input type="checkbox" id="darkModeToggle">
                <span class="slider round"></span>
            </label>
            <i class="fas fa-sun"></i>
        </div>
    </aside>

    <div class="bottom-nav">
        <button class="nav-item active" data-tab="dashboard">
            <i class="fas fa-chart-pie"></i>
            <span>Stats</span>
        </button>
        <button class="nav-item fab" id="mobileAddBtn">
            <i class="fas fa-plus"></i>
            <span>Add</span>
        </button>
        <button class="nav-item" data-tab="library">
            <i class="fas fa-gamepad"></i>
            <span>Library</span>
        </button>
    </div>

    <main class="main-content">
        <header class="content-header">
            <h1 id="pageTitle">Dashboard</h1>
            <button id="addGameBtn" class="btn-primary">
                <i class="fas fa-plus"></i> Add Game
            </button>
        </header>

        <section id="dashboardSection" class="section active">
            <div class="stats-grid">
                <div class="stat-card">
                    <i class="fas fa-gamepad"></i>
                    <div>
                        <h3>Total Games</h3>
                        <p id="totalGames">0</p>
                    </div>
                </div>
                <div class="stat-card">
                    <i class="fas fa-trophy"></i>
                    <div>
                        <h3>Completed</h3>
                        <p id="completedGames">0</p>
                    </div>
                </div>
                <div class="stat-card">
                    <i class="fas fa-clock"></i>
                    <div>
                        <h3>Total Hours</h3>
                        <p id="totalHours">0</p>
                    </div>
                </div>
                <div class="stat-card">
                    <i class="fas fa-star"></i>
                    <div>
                        <h3>Avg Rating</h3>
                        <p id="avgRating">0.0</p>
                    </div>
                </div>
            </div>
            <div class="charts-row">
                <div class="chart-card">
                    <canvas id="genreChart"></canvas>
                    <h4 style="text-align: center; margin-top: 1rem;">Top Genres</h4>
                </div>
                <div class="chart-card">
                    <canvas id="completionChart"></canvas>
                    <h4 style="text-align: center; margin-top: 1rem;">Completion Status</h4>
                </div>
                <div class="chart-card">
                    <canvas id="ratingChart"></canvas>
                    <h4 style="text-align: center; margin-top: 1rem;">Rating Distribution</h4>
                </div>
            </div>
        </section>

        <section id="librarySection" class="section">
            <div class="filter-bar">
                <div class="search-box">
                    <i class="fas fa-search"></i>
                    <input type="text" id="searchInput" placeholder="Search your library...">
                </div>
                <select id="filterGenre">
                    <option value="">All Genres</option>
                </select>
                <select id="filterPlatform">
                    <option value="">All Platforms</option>
                </select>
                <select id="filterRating">
                    <option value="">All Ratings</option>
                    <option value="5">5★</option>
                    <option value="4">4★+</option>
                    <option value="3">3★+</option>
                </select>
                <select id="filterStatus">
                    <option value="">All Status</option>
                    <option value="completed">Completed</option>
                    <option value="playing">Playing</option>
                    <option value="backlog">Backlog</option>
                </select>
            </div>
            <div id="gamesGrid" class="games-grid">
                <div class="empty-state">
                    <i class="fas fa-gamepad" style="font-size: 3rem; margin-bottom: 1rem;"></i>
                    <p>Loading games...</p>
                </div>
            </div>
        </section>
    </main>
</div>

<div id="gameModal" class="modal">
    <div class="modal-content">
        <div class="modal-header">
            <h3 id="modalTitle">Add New Game</h3>
            <span class="close-modal">&times;</span>
        </div>
        <div style="position: relative; margin-bottom: 1rem;">
            <input type="text" id="gameSearchInput" placeholder="🔍 Search game from RAWG..." style="width: 100%; padding: 12px; border-radius: 50px; border: 1px solid var(--border); background: var(--bg-primary);">
            <div id="searchResults" class="search-results"></div>
        </div>
        <div style="text-align: center; margin: 10px 0; color: var(--text-secondary);">— OR —</div>
        <form id="gameForm">
            <input type="hidden" id="gameId">
            <div class="form-group">
                <label>Game Title *</label>
                <input type="text" id="title" required>
            </div>
            <div id="coverPreviewContainer" style="display: none;">
                <img id="coverPreview" class="cover-preview" src="">
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label>Platform</label>
                    <input type="text" id="platform">
                </div>
                <div class="form-group">
                    <label>Genre</label>
                    <input type="text" id="genre">
                </div>
            </div>
            <div class="form-group">
                <label>Tags (comma)</label>
                <input type="text" id="tags">
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label>Progress (%)</label>
                    <input type="number" id="progress" min="0" max="100" value="0">
                </div>
                <div class="form-group">
                    <label>Rating (1-5)</label>
                    <input type="number" id="rating" step="0.5" min="1" max="5" value="3">
                </div>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label>Hours Played</label>
                    <input type="number" id="hours_played" step="0.5" value="0">
                </div>
                <div class="form-group">
                    <label>Status</label>
                    <select id="status">
                        <option value="backlog">📚 Backlog</option>
                        <option value="playing">🎮 Playing</option>
                        <option value="completed">🏆 Completed</option>
                    </select>
                </div>
            </div>
            <button type="submit" class="btn-primary" style="width: 100%;">💾 Save Game</button>
        </form>
    </div>
</div>

<div id="deleteModal" class="modal">
    <div class="modal-content" style="max-width: 400px;">
        <h3>🗑️ Confirm Delete</h3>
        <p>Are you sure you want to delete this game?</p>
        <div style="display: flex; gap: 1rem; margin-top: 1.5rem;">
            <button id="confirmDeleteBtn" style="background: #ef4444; border: none; padding: 10px 24px; border-radius: 40px; color: white; cursor: pointer;">Delete</button>
            <button id="cancelDeleteBtn" style="background: var(--border); border: none; padding: 10px 24px; border-radius: 40px; cursor: pointer;">Cancel</button>
        </div>
    </div>
</div>

<script>
    // ============================================
    // GAME TRACKER - ALL-IN-ONE VERSION
    // ============================================

    // Configuration
    const SUPABASE_URL = 'https://inwjlxiqxtztjtrttqke.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_ntFp5P_qMnQKQSv3-MX9RA_dgOit_H1';
    const RAWG_API_KEY = 'acb03a4a2dd04337b6b62eb78e325c59';

    // Initialize Supabase
    const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    // State
    let gamesData = [];
    let genreChart, completionChart, ratingChart;
    let currentCoverUrl = null;
    let deleteId = null;

    // Helper Functions
    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            return m === '&' ? '&amp;' : m === '<' ? '&lt;' : '&gt;';
        });
    }

    function renderStars(rating) {
        let stars = '';
        const fullStars = Math.floor(rating);
        const hasHalfStar = rating % 1 !== 0;
        
        for (let i = 1; i <= 5; i++) {
            if (i <= fullStars) {
                stars += '<i class="fas fa-star"></i>';
            } else if (hasHalfStar && i === fullStars + 1) {
                stars += '<i class="fas fa-star-half-alt"></i>';
            } else {
                stars += '<i class="far fa-star"></i>';
            }
        }
        return stars;
    }

    function showNotification(message, type) {
        let notification = document.getElementById('notification');
        if (!notification) {
            notification = document.createElement('div');
            notification.id = 'notification';
            document.body.appendChild(notification);
        }
        notification.textContent = message;
        notification.className = `notification ${type}`;
        notification.style.display = 'block';
        setTimeout(() => {
            notification.style.display = 'none';
        }, 3000);
    }

    // RAWG API Functions
    async function searchGamesFromAPI(query) {
        if (!query || query.length < 2) return [];
        try {
            const url = `https://api.rawg.io/api/games?search=${encodeURIComponent(query)}&key=${RAWG_API_KEY}&page_size=8`;
            const response = await fetch(url);
            const data = await response.json();
            return data.results?.map(game => ({
                id: game.id,
                name: game.name,
                cover: game.background_image,
                genres: game.genres?.map(g => g.name).join(', ') || '',
                platforms: game.platforms?.map(p => p.platform.name).slice(0, 2).join(', ') || '',
                rating: game.rating || 0
            })) || [];
        } catch (error) {
            console.error('Search error:', error);
            return [];
        }
    }

    // Render Functions
    function renderLibrary() {
        const search = document.getElementById('searchInput')?.value.toLowerCase() || '';
        const genreFilter = document.getElementById('filterGenre')?.value || '';
        const platformFilter = document.getElementById('filterPlatform')?.value || '';
        const ratingFilter = document.getElementById('filterRating')?.value || '';
        const statusFilter = document.getElementById('filterStatus')?.value || '';

        let filtered = gamesData.filter(g => g.title?.toLowerCase().includes(search));
        
        if (genreFilter) filtered = filtered.filter(g => g.genre === genreFilter);
        if (platformFilter) filtered = filtered.filter(g => g.platform === platformFilter);
        if (ratingFilter) filtered = filtered.filter(g => g.rating >= parseInt(ratingFilter));
        if (statusFilter) filtered = filtered.filter(g => g.status === statusFilter);

        const grid = document.getElementById('gamesGrid');
        if (!grid) return;
        
        if (!filtered.length) {
            grid.innerHTML = `<div class="empty-state"><i class="fas fa-gamepad" style="font-size:3rem; margin-bottom:1rem"></i><p>No games found. Add your first game!</p></div>`;
            return;
        }
        
        grid.innerHTML = filtered.map(game => `
            <div class="game-card" data-id="${game.id}">
                <div class="game-cover">
                    <img src="${game.cover_url || 'https://placehold.co/400x200/1e1b2e/0078f0?text=' + encodeURIComponent(game.title.substring(0,1))}" 
                         alt="${escapeHtml(game.title)}" loading="lazy"
                         onerror="this.src='https://placehold.co/400x200/1e1b2e/0078f0?text=${encodeURIComponent(game.title.substring(0,2))}'">
                    <div class="free-badge"><i class="fas fa-download"></i> ${game.status === 'completed' ? 'COMPLETED' : 'PLAY NOW'}</div>
                    <div class="progress-overlay">
                        <div class="progress-fill" style="width:${game.progress || 0}%"></div>
                    </div>
                </div>
                <div class="card-content">
                    <div class="game-title">
                        ${escapeHtml(game.title)}
                        <small>${escapeHtml(game.platform) || '-'}</small>
                    </div>
                    <div class="rating-stars">
                        ${renderStars(game.rating || 0)} 
                        <span style="font-size:0.7rem">⏱️ ${game.hours_played || 0}h</span>
                    </div>
                    <div class="game-meta">
                        <span class="tag">${escapeHtml(game.genre) || 'General'}</span>
                        ${game.tags ? game.tags.split(',').slice(0,2).map(t => `<span class="tag">#${escapeHtml(t.trim())}</span>`).join('') : ''}
                    </div>
                    <div class="card-actions">
                        <button class="edit-game" data-id="${game.id}"><i class="fas fa-edit"></i> Edit</button>
                        <button class="delete-game" data-id="${game.id}"><i class="fas fa-trash-alt"></i> Delete</button>
                    </div>
                </div>
            </div>
        `).join('');
        
        document.querySelectorAll('.edit-game').forEach(btn => {
            btn.addEventListener('click', (e) => {
                e.stopPropagation();
                openEditModal(btn.dataset.id);
            });
        });
        
        document.querySelectorAll('.delete-game').forEach(btn => {
            btn.addEventListener('click', (e) => {
                e.stopPropagation();
                deleteId = btn.dataset.id;
                document.getElementById('deleteModal').style.display = 'flex';
            });
        });
    }

    function updateDashboard() {
        const total = gamesData.length;
        const completed = gamesData.filter(g => g.status === 'completed').length;
        const totalHours = gamesData.reduce((sum, g) => sum + (g.hours_played || 0), 0);
        const avgRating = total > 0 ? (gamesData.reduce((sum, g) => sum + (g.rating || 0), 0) / total).toFixed(1) : 0;
        
        document.getElementById('totalGames').innerText = total;
        document.getElementById('completedGames').innerText = completed;
        document.getElementById('totalHours').innerText = totalHours;
        document.getElementById('avgRating').innerText = avgRating;
        
        updateCharts();
    }

    function updateCharts() {
        const genreCount = {};
        gamesData.forEach(g => {
            if (g.genre) genreCount[g.genre] = (genreCount[g.genre] || 0) + 1;
        });
        const topGenres = Object.entries(genreCount).sort((a, b) => b[1] - a[1]).slice(0, 5);
        
        const genreCtx = document.getElementById('genreChart')?.getContext('2d');
        if (genreCtx) {
            if (genreChart) genreChart.destroy();
            genreChart = new Chart(genreCtx, {
                type: 'doughnut',
                data: {
                    labels: topGenres.map(g => g[0]),
                    datasets: [{
                        data: topGenres.map(g => g[1]),
                        backgroundColor: ['#0078f0', '#ec4899', '#06b6d4', '#f97316', '#10b981']
                    }]
                },
                options: { responsive: true, maintainAspectRatio: true, plugins: { legend: { position: 'bottom', labels: { color: '#fff' } } } }
            });
        }
        
        const completionCtx = document.getElementById('completionChart')?.getContext('2d');
        if (completionCtx) {
            const completionData = [
                gamesData.filter(g => g.status === 'completed').length,
                gamesData.filter(g => g.status === 'playing').length,
                gamesData.filter(g => g.status === 'backlog').length
            ];
            if (completionChart) completionChart.destroy();
            completionChart = new Chart(completionCtx, {
                type: 'bar',
                data: {
                    labels: ['Completed', 'Playing', 'Backlog'],
                    datasets: [{ label: 'Games', data: completionData, backgroundColor: '#0078f0', borderRadius: 10 }]
                },
                options: { responsive: true, maintainAspectRatio: true, plugins: { legend: { display: false } }, scales: { y: { beginAtZero: true, ticks: { color: '#fff' } }, x: { ticks: { color: '#fff' } } } }
            });
        }
        
        const ratingCtx = document.getElementById('ratingChart')?.getContext('2d');
        if (ratingCtx) {
            const ratingDist = [0, 0, 0, 0, 0];
            gamesData.forEach(g => {
                if (g.rating >= 1 && g.rating <= 5) ratingDist[Math.floor(g.rating) - 1]++;
            });
            if (ratingChart) ratingChart.destroy();
            ratingChart = new Chart(ratingCtx, {
                type: 'line',
                data: {
                    labels: ['★1', '★2', '★3', '★4', '★5'],
                    datasets: [{ label: 'Games', data: ratingDist, borderColor: '#f59e0b', tension: 0.3, fill: true, backgroundColor: 'rgba(245,158,11,0.1)' }]
                },
                options: { responsive: true, maintainAspectRatio: true, scales: { y: { ticks: { color: '#fff' } }, x: { ticks: { color: '#fff' } } } }
            });
        }
    }

    function updateFilters() {
        const genres = [...new Set(gamesData.map(g => g.genre).filter(Boolean))];
        const platforms = [...new Set(gamesData.map(g => g.platform).filter(Boolean))];
        
        const genreSelect = document.getElementById('filterGenre');
        const platformSelect = document.getElementById('filterPlatform');
        
        if (genreSelect) {
            genreSelect.innerHTML = '<option value="">All Genres</option>' + genres.map(g => `<option value="${escapeHtml(g)}">${escapeHtml(g)}</option>`).join('');
        }
        if (platformSelect) {
            platformSelect.innerHTML = '<option value="">All Platforms</option>' + platforms.map(p => `<option value="${escapeHtml(p)}">${escapeHtml(p)}</option>`).join('');
        }
    }

    // CRUD Functions
    async function fetchGames() {
        try {
            const { data, error } = await supabaseClient.from('games').select('*').order('created_at', { ascending: false });
            if (error) throw error;
            gamesData = data || [];
            console.log(`Loaded ${gamesData.length} games`);
            renderLibrary();
            updateDashboard();
            updateFilters();
        } catch (error) {
            console.error('Error fetching games:', error);
            showNotification('Failed to load games', 'error');
        }
    }

    async function saveGame(event) {
        event.preventDefault();
        
        const id = document.getElementById('gameId')?.value;
        const game = {
            title: document.getElementById('title')?.value,
            platform: document.getElementById('platform')?.value || null,
            genre: document.getElementById('genre')?.value || null,
            tags: document.getElementById('tags')?.value || null,
            progress: parseInt(document.getElementById('progress')?.value || 0),
            rating: parseFloat(document.getElementById('rating')?.value || 3),
            hours_played: parseFloat(document.getElementById('hours_played')?.value || 0),
            status: document.getElementById('status')?.value,
            cover_url: currentCoverUrl || null,
            updated_at: new Date().toISOString()
        };
        
        if (!game.title) {
            showNotification('Title is required!', 'error');
            return;
        }
        
        try {
            if (id) {
                await supabaseClient.from('games').update(game).eq('id', id);
                showNotification('Game updated!', 'success');
            } else {
                await supabaseClient.from('games').insert([{ ...game, created_at: new Date().toISOString() }]);
                showNotification('Game added!', 'success');
            }
            closeModal();
            fetchGames();
        } catch (error) {
            console.error('Error saving game:', error);
            showNotification('Failed to save game', 'error');
        }
    }

    async function deleteGame() {
        if (!deleteId) return;
        try {
            await supabaseClient.from('games').delete().eq('id', deleteId);
            showNotification('Game deleted!', 'success');
            fetchGames();
            closeDeleteModal();
        } catch (error) {
            showNotification('Failed to delete', 'error');
        }
    }

    // Modal Functions
    function openEditModal(id) {
        const game = gamesData.find(g => g.id == id);
        if (game) {
            document.getElementById('modalTitle').innerText = 'Edit Game';
            document.getElementById('gameId').value = game.id;
            document.getElementById('title').value = game.title;
            document.getElementById('platform').value = game.platform || '';
            document.getElementById('genre').value = game.genre || '';
            document.getElementById('tags').value = game.tags || '';
            document.getElementById('progress').value = game.progress;
            document.getElementById('rating').value = game.rating;
            document.getElementById('hours_played').value = game.hours_played || 0;
            document.getElementById('status').value = game.status;
            currentCoverUrl = game.cover_url;
            
            if (currentCoverUrl) {
                document.getElementById('coverPreview').src = currentCoverUrl;
                document.getElementById('coverPreviewContainer').style.display = 'block';
            }
            document.getElementById('gameModal').style.display = 'flex';
        }
    }

    function closeModal() {
        document.getElementById('gameModal').style.display = 'none';
        document.getElementById('gameForm').reset();
        document.getElementById('gameId').value = '';
        document.getElementById('coverPreviewContainer').style.display = 'none';
        document.getElementById('searchResults').style.display = 'none';
        document.getElementById('gameSearchInput').value = '';
        currentCoverUrl = null;
    }

    function closeDeleteModal() {
        document.getElementById('deleteModal').style.display = 'none';
        deleteId = null;
    }

    // Search Auto-fill
    let searchTimeout = null;

    function setupGameSearch() {
        const searchInput = document.getElementById('gameSearchInput');
        const resultsDiv = document.getElementById('searchResults');
        
        if (!searchInput) return;
        
        searchInput.addEventListener('input', async (e) => {
            const query = e.target.value.trim();
            if (searchTimeout) clearTimeout(searchTimeout);
            
            if (query.length < 2) {
                resultsDiv.style.display = 'none';
                return;
            }
            
            searchTimeout = setTimeout(async () => {
                resultsDiv.innerHTML = '<div style="padding: 1rem; text-align: center;"><i class="fas fa-spinner fa-pulse"></i> Searching...</div>';
                resultsDiv.style.display = 'block';
                
                const results = await searchGamesFromAPI(query);
                
                if (!results.length) {
                    resultsDiv.innerHTML = '<div style="padding: 1rem; text-align: center;">No games found</div>';
                    return;
                }
                
                resultsDiv.innerHTML = results.map(game => `
                    <div class="search-result-item" data-game='${JSON.stringify(game)}'>
                        <img src="${game.cover || 'https://placehold.co/50x50/0078f0/white?text=?'}" alt="${escapeHtml(game.name)}">
                        <div>
                            <h4>${escapeHtml(game.name)}</h4>
                            <p>${game.genres || 'No genre'} | ⭐ ${game.rating}</p>
                        </div>
                    </div>
                `).join('');
                
                document.querySelectorAll('.search-result-item').forEach(item => {
                    item.addEventListener('click', () => {
                        const gameData = JSON.parse(item.dataset.game);
                        autoFillForm(gameData);
                        resultsDiv.style.display = 'none';
                        searchInput.value = '';
                    });
                });
            }, 500);
        });
        
        document.addEventListener('click', (e) => {
            if (!searchInput.contains(e.target) && !resultsDiv.contains(e.target)) {
                resultsDiv.style.display = 'none';
            }
        });
    }

    function autoFillForm(gameData) {
        document.getElementById('title').value = gameData.name;
        if (gameData.platforms) {
            document.getElementById('platform').value = gameData.platforms.split(',')[0].trim();
        }
        if (gameData.genres) {
            document.getElementById('genre').value = gameData.genres;
            const tags = gameData.genres.split(',').map(g => g.trim().toLowerCase());
            document.getElementById('tags').value = tags.join(', ');
        }
        if (gameData.rating) {
            const rounded = Math.round(gameData.rating * 2) / 2;
            document.getElementById('rating').value = Math.min(5, Math.max(1, rounded));
        }
        if (gameData.cover) {
            currentCoverUrl = gameData.cover;
            document.getElementById('coverPreview').src = gameData.cover;
            document.getElementById('coverPreviewContainer').style.display = 'block';
        }
        showNotification(`Game "${gameData.name}" auto-filled!`, 'success');
    }

    // Tab Navigation
    function switchTab(tab) {
        document.querySelectorAll('.nav-link, .nav-item').forEach(el => {
            el.classList.remove('active');
        });
        document.querySelectorAll(`[data-tab="${tab}"]`).forEach(el => {
            el.classList.add('active');
        });
        
        document.getElementById('dashboardSection').classList.toggle('active', tab === 'dashboard');
        document.getElementById('librarySection').classList.toggle('active', tab === 'library');
        document.getElementById('pageTitle').innerText = tab === 'dashboard' ? 'Dashboard' : 'Game Library';
        
        if (tab === 'library') renderLibrary();
    }

    // Dark Mode
    function setupDarkMode() {
        const darkModeToggle = document.getElementById('darkModeToggle');
        if (darkModeToggle) {
            const saved = localStorage.getItem('darkMode') === 'true';
            darkModeToggle.checked = saved;
            if (saved) document.body.classList.add('dark-mode');
            darkModeToggle.addEventListener('change', () => {
                document.body.classList.toggle('dark-mode', darkModeToggle.checked);
                localStorage.setItem('darkMode', darkModeToggle.checked);
                updateCharts();
            });
        }
    }

    // Initialization
    document.addEventListener('DOMContentLoaded', () => {
        console.log('🚀 Game Tracker Starting...');
        
        setupGameSearch();
        setupDarkMode();
        
        // Tab switching
        document.querySelectorAll('.nav-link, .nav-item').forEach(el => {
            el.addEventListener('click', (e) => {
                e.preventDefault();
                switchTab(el.dataset.tab);
            });
        });
        
        // Add game buttons
        document.getElementById('addGameBtn').addEventListener('click', () => {
            document.getElementById('modalTitle').innerText = 'Add New Game';
            document.getElementById('gameForm').reset();
            document.getElementById('gameId').value = '';
            document.getElementById('progress').value = 0;
            document.getElementById('rating').value = 3;
            document.getElementById('hours_played').value = 0;
            document.getElementById('status').value = 'backlog';
            document.getElementById('coverPreviewContainer').style.display = 'none';
            currentCoverUrl = null;
            document.getElementById('gameModal').style.display = 'flex';
        });
        
        document.getElementById('mobileAddBtn')?.addEventListener('click', () => {
            document.getElementById('addGameBtn').click();
        });
        
        // Close modals
        document.querySelectorAll('.close-modal, .modal').forEach(el => {
            el.addEventListener('click', function(e) {
                if (e.target === this || e.target.classList.contains('close-modal')) {
                    closeModal();
                    closeDeleteModal();
                }
            });
        });
        
        // Delete buttons
        document.getElementById('confirmDeleteBtn').addEventListener('click', deleteGame);
        document.getElementById('cancelDeleteBtn').addEventListener('click', closeDeleteModal);
        
        // Save form
        document.getElementById('gameForm').addEventListener('submit', saveGame);
        
        // Filters
        document.getElementById('searchInput').addEventListener('input', () => renderLibrary());
        document.getElementById('filterGenre').addEventListener('change', renderLibrary);
        document.getElementById('filterPlatform').addEventListener('change', renderLibrary);
        document.getElementById('filterRating').addEventListener('change', renderLibrary);
        document.getElementById('filterStatus').addEventListener('change', renderLibrary);
        
        // Initial fetch
        fetchGames();
        
        // Realtime subscription
        supabaseClient.channel('games-channel')
            .on('postgres_changes', { event: '*', schema: 'public', table: 'games' }, () => fetchGames())
            .subscribe();
        
        console.log('✅ App Ready');
    });
</script>
</body>
</html>
