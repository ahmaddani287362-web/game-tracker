<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>GameVault · Grid Library</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(145deg, #0b0e18 0%, #10131f 100%);
            font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            color: #eef2ff;
            padding: 2rem 1.8rem;
        }

        /* main container — grid-based layout with right-side emphasis */
        .app-wrapper {
            max-width: 1600px;
            margin: 0 auto;
        }

        /* ========= HEADER / SIDEBAR-LIKE MENU ========= */
        .gamevault-header {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            flex-wrap: wrap;
            gap: 1rem;
            margin-bottom: 2.5rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
        }

        .logo-area h1 {
            font-size: 1.9rem;
            font-weight: 700;
            background: linear-gradient(135deg, #d9e2ff, #a87eff);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            letter-spacing: -0.3px;
        }

        .logo-area p {
            font-size: 0.75rem;
            color: #7f8ea3;
            margin-top: 4px;
        }

        .nav-menu {
            display: flex;
            gap: 2rem;
            background: rgba(18, 22, 35, 0.7);
            backdrop-filter: blur(8px);
            padding: 0.5rem 1.2rem;
            border-radius: 60px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .nav-menu span {
            font-weight: 500;
            font-size: 0.95rem;
            cursor: default;
            transition: 0.2s;
            color: #b9c3db;
        }

        .nav-menu span:first-child {
            color: white;
            border-bottom: 2px solid #a87eff;
            padding-bottom: 4px;
        }

        /* ========= FILTER & SEARCH SECTION ========= */
        .controls-panel {
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: center;
            gap: 1.5rem;
            margin-bottom: 2.2rem;
            background: rgba(12, 16, 28, 0.6);
            backdrop-filter: blur(4px);
            padding: 1rem 1.6rem;
            border-radius: 2rem;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .search-box {
            flex: 2;
            min-width: 220px;
        }

        .search-box input {
            width: 100%;
            background: #0f121f;
            border: 1px solid #282e3f;
            border-radius: 60px;
            padding: 0.75rem 1.3rem;
            font-size: 0.9rem;
            color: #f0f3ff;
            transition: all 0.2s;
            font-family: inherit;
        }

        .search-box input:focus {
            outline: none;
            border-color: #a87eff;
            box-shadow: 0 0 0 2px rgba(168, 126, 255, 0.2);
        }

        .search-box input::placeholder {
            color: #5b677d;
        }

        .filter-group {
            display: flex;
            flex-wrap: wrap;
            gap: 1rem;
            align-items: center;
        }

        .filter-group select {
            background: #0f121f;
            border: 1px solid #2a2f42;
            padding: 0.6rem 1rem;
            border-radius: 2rem;
            color: #e2e8ff;
            font-weight: 500;
            font-size: 0.85rem;
            cursor: pointer;
            font-family: inherit;
            transition: 0.2s;
        }

        .filter-group select:focus {
            border-color: #a87eff;
        }

        /* ========= GAME GRID — RIGHT‑ALIGNED FLEX/GRID ========= */
        /* "biar ke grid game ke kanan" → games will shift to right side,
           but using a responsive grid that respects empty space on left
           and pushes items more to the right when room exists.
           We'll use a combination: main container with display: grid
           and justify-content: end, or better: auto-fill + margin left auto?
           To achieve "grid game ke kanan" like a right-aligned gallery,
           we set the grid container to have content that leans right.
           Classic method: flex wrap with justify-content: flex-end, but we need structured grid.
           I will use CSS Grid with grid-template-columns: repeat(auto-fill, minmax(280px, 320px));
           then add margin-left: auto on the grid container? not perfect.
           Actually to make games stick to the right side (like RTL gallery but LTR text),
           we set parent text-align? no. Instead wrap grid in a flex container with justify-content: flex-end?
           But we also want left space on big screens → games appear as a block on the right.
        */
        
        /* Approach: outer wrapper as flex with justify-content: flex-end,
           and inside grid behaves normally, but it will be placed on the right side.
           However, we want search/filter above to remain full-width, only game grid right-aligned.
        */
        .games-section {
            margin-top: 1rem;
        }

        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            margin-bottom: 1.5rem;
            flex-wrap: wrap;
        }

        .section-header h2 {
            font-weight: 600;
            font-size: 1.7rem;
            background: linear-gradient(120deg, #f0f3ff, #c6b5ff);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
        }

        .game-count {
            font-size: 0.85rem;
            background: #1e2338;
            padding: 0.2rem 0.8rem;
            border-radius: 40px;
        }

        /* RIGHT-ALIGNED GRID CONTAINER */
        /* The requirement: "biar ke grid game ke kanan" – we shift the whole grid container to the right,
           while keeping filters/search on top full-width. This creates modern asymmetric layout. */
        .right-aligned-grid {
            display: flex;
            justify-content: flex-end;
            /* the grid container will be pushed right */
        }

        .game-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(290px, 320px));
            gap: 1.8rem;
            width: 100%;
            max-width: 1400px;
            transition: all 0.2s;
        }

        /* To force grid items to be right-aligned within available space, we set margin-left: auto on the grid?
           But that makes grid container shrink to content width, causing items to stack left? No.
           The clean method: .right-aligned-grid > .game-grid { margin-left: auto; margin-right: 0; }
           This makes the grid container hug the right side, and inside grid items behave normally.
           Exactly "ke kanan" – the whole library block sits on the right side, empty space on left.
           This matches modern design where content floats right.
        */
        .right-aligned-grid .game-grid {
            margin-left: auto;
            margin-right: 0;
        }

        /* responsive: on smaller screens, remove margin-left to use full width */
        @media (max-width: 860px) {
            .right-aligned-grid .game-grid {
                margin-left: 0;
                width: 100%;
            }
            .right-aligned-grid {
                justify-content: center;
            }
            body {
                padding: 1.2rem;
            }
        }

        /* Game Card Styling */
        .game-card {
            background: #11141f;
            border-radius: 1.8rem;
            overflow: hidden;
            transition: all 0.25s ease;
            border: 1px solid rgba(255, 255, 255, 0.06);
            backdrop-filter: blur(2px);
            box-shadow: 0 15px 30px -12px rgba(0, 0, 0, 0.5);
        }

        .game-card:hover {
            transform: translateY(-6px);
            border-color: rgba(168, 126, 255, 0.4);
            box-shadow: 0 22px 35px -14px rgba(0, 0, 0, 0.6);
        }

        .card-content {
            padding: 1.4rem 1.3rem 1.5rem 1.3rem;
        }

        .game-title {
            font-size: 1.35rem;
            font-weight: 700;
            letter-spacing: -0.2px;
            margin-bottom: 0.5rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .game-title h3 {
            font-weight: 700;
            font-size: 1.25rem;
        }

        .badge-difficulty {
            font-size: 0.7rem;
            background: #1e293b;
            padding: 0.2rem 0.6rem;
            border-radius: 30px;
            font-weight: 500;
        }

        .game-meta {
            display: flex;
            flex-wrap: wrap;
            gap: 0.6rem;
            margin: 0.8rem 0 0.9rem 0;
            font-size: 0.8rem;
            color: #9aa5c1;
        }

        .game-meta span {
            background: #1a1e2c;
            padding: 0.2rem 0.7rem;
            border-radius: 20px;
        }

        .rating-row {
            display: flex;
            align-items: center;
            gap: 6px;
            flex-wrap: wrap;
            margin: 10px 0 6px;
        }

        .stars {
            color: #f5b042;
            letter-spacing: 2px;
            font-size: 0.9rem;
        }

        .rating-value {
            font-weight: 600;
            background: #1f253b;
            padding: 2px 8px;
            border-radius: 20px;
            font-size: 0.75rem;
        }

        .vote-count {
            font-size: 0.7rem;
            color: #7f8bae;
        }

        .game-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 1.2rem;
            padding-top: 0.8rem;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
        }

        .last-updated {
            font-size: 0.7rem;
            color: #6b779b;
        }

        .action-buttons {
            display: flex;
            gap: 0.8rem;
        }

        .edit-btn, .delete-btn {
            background: none;
            border: none;
            font-size: 0.75rem;
            font-weight: 600;
            padding: 0.3rem 0.8rem;
            border-radius: 40px;
            cursor: pointer;
            transition: 0.2s;
            font-family: inherit;
        }

        .edit-btn {
            background: #2d2f42;
            color: #cddbff;
        }

        .edit-btn:hover {
            background: #3d4070;
            color: white;
        }

        .delete-btn {
            background: #2c1e2c;
            color: #ffaea3;
        }

        .delete-btn:hover {
            background: #631e1e;
            color: white;
        }

        .empty-message {
            text-align: center;
            padding: 4rem 2rem;
            background: #0c0f1a;
            border-radius: 2rem;
            color: #8f9bb3;
            font-weight: 500;
        }

        /* additional styling */
        .genre-chip {
            text-transform: capitalize;
        }
    </style>
</head>
<body>
<div class="app-wrapper">
    <!-- Header & Menu (Dashboard, My Library, Add Game) -->
    <div class="gamevault-header">
        <div class="logo-area">
            <h1>🎮 GameVault</h1>
            <p>curate your journey</p>
        </div>
        <div class="nav-menu">
            <span>Dashboard</span>
            <span>My Library</span>
            <span>Add Game</span>
        </div>
    </div>

    <!-- Search & Filters exactly as design -->
    <div class="controls-panel">
        <div class="search-box">
            <input type="text" id="searchInput" placeholder="🔍 Search games" autocomplete="off">
        </div>
        <div class="filter-group">
            <select id="platformFilter">
                <option value="all">All Platforms</option>
                <option value="Mobile">Mobile</option>
                <option value="PC">PC</option>
                <option value="Console">Console</option>
            </select>
            <select id="ratingFilter">
                <option value="all">All Ratings</option>
                <option value="4.5">4.5+ Stars</option>
                <option value="4">4.0+ Stars</option>
                <option value="3">3.0+ Stars</option>
            </select>
            <select id="statusFilter">
                <option value="all">All Status</option>
                <option value="Backlog">Backlog</option>
                <option value="Playing">Playing</option>
                <option value="Completed">Completed</option>
            </select>
        </div>
    </div>

    <!-- Game Library Section + Right-aligned Grid (ke kanan) -->
    <div class="games-section">
        <div class="section-header">
            <h2>📚 Game Library</h2>
            <div class="game-count" id="gameCounter">0 titles</div>
        </div>

        <!-- Right-aligned wrapper: the entire grid will be pushed to the right side -->
        <div class="right-aligned-grid">
            <div class="game-grid" id="gameGridContainer">
                <!-- dynamic game cards injected here -->
            </div>
        </div>
    </div>
</div>

<script>
    // ---------- GAME DATA (extended from the screenshot + extra for demo) ----------
    // include League of Legends: Wild Rift as baseline, plus more games to show grid on the right.
    const gamesData = [
        {
            id: 1,
            title: "League of Legends: Wild Rift",
            rating: 4.5,
            starsCount: 3120,
            difficulty: "Easy",
            genre: "MOBA",
            lastUpdated: "1 day ago",
            platform: "Mobile",
            status: "Backlog",
            ratingValue: 4.5
        },
        {
            id: 2,
            title: "Stellar Horizon",
            rating: 4.8,
            starsCount: 8950,
            difficulty: "Medium",
            genre: "RPG",
            lastUpdated: "3 days ago",
            platform: "PC",
            status: "Playing",
            ratingValue: 4.8
        },
        {
            id: 3,
            title: "Cyber Oath",
            rating: 4.2,
            starsCount: 2100,
            difficulty: "Hard",
            genre: "Action",
            lastUpdated: "5 days ago",
            platform: "Console",
            status: "Backlog",
            ratingValue: 4.2
        },
        {
            id: 4,
            title: "Mystic Echoes",
            rating: 4.9,
            starsCount: 4700,
            difficulty: "Medium",
            genre: "Adventure",
            lastUpdated: "12 hours ago",
            platform: "Mobile",
            status: "Completed",
            ratingValue: 4.9
        },
        {
            id: 5,
            title: "Apex Legends: Mobile",
            rating: 4.3,
            starsCount: 5600,
            difficulty: "Hard",
            genre: "Battle Royale",
            lastUpdated: "2 days ago",
            platform: "Mobile",
            status: "Playing",
            ratingValue: 4.3
        },
        {
            id: 6,
            title: "Elden Ring (Shadow Keep)",
            rating: 4.9,
            starsCount: 28900,
            difficulty: "Expert",
            genre: "Souls-like",
            lastUpdated: "2 weeks ago",
            platform: "Console",
            status: "Backlog",
            ratingValue: 4.9
        },
        {
            id: 7,
            title: "Hades II",
            rating: 4.7,
            starsCount: 8450,
            difficulty: "Medium",
            genre: "Roguelite",
            lastUpdated: "6 days ago",
            platform: "PC",
            status: "Playing",
            ratingValue: 4.7
        }
    ];

    // Helper: render star display
    function renderStars(rating) {
        const fullStars = Math.floor(rating);
        const halfStar = (rating % 1) >= 0.5;
        let starString = '';
        for (let i = 0; i < fullStars; i++) starString += '★';
        if (halfStar) starString += '½';
        const emptyStars = 5 - Math.ceil(rating);
        for (let i = 0; i < emptyStars; i++) starString += '☆';
        return starString;
    }

    // filter logic based on search, platform, rating threshold, status
    function filterGames() {
        const searchTerm = document.getElementById('searchInput').value.toLowerCase().trim();
        const platformVal = document.getElementById('platformFilter').value;
        const ratingFilterVal = document.getElementById('ratingFilter').value;
        const statusVal = document.getElementById('statusFilter').value;

        return gamesData.filter(game => {
            // search match
            if (searchTerm && !game.title.toLowerCase().includes(searchTerm)) return false;
            // platform match
            if (platformVal !== 'all' && game.platform !== platformVal) return false;
            // rating filter (minimum stars)
            if (ratingFilterVal !== 'all') {
                const minRating = parseFloat(ratingFilterVal);
                if (game.ratingValue < minRating) return false;
            }
            // status match
            if (statusVal !== 'all' && game.status !== statusVal) return false;
            return true;
        });
    }

    // generate game cards HTML and inject into grid
    function renderGameGrid() {
        const filtered = filterGames();
        const gridContainer = document.getElementById('gameGridContainer');
        const counterSpan = document.getElementById('gameCounter');
        counterSpan.innerText = `${filtered.length} ${filtered.length === 1 ? 'title' : 'titles'}`;

        if (filtered.length === 0) {
            gridContainer.innerHTML = `<div class="empty-message" style="grid-column:1/-1; width:100%;">✨ No games match your filters. Try adjusting search or criteria ✨</div>`;
            return;
        }

        // map each game to card
        const cardsHtml = filtered.map(game => {
            const starSymbols = renderStars(game.rating);
            // format stars count with + if > 1000
            const formattedStars = game.starsCount >= 1000 ? (game.starsCount/1000).toFixed(1)+'k' : game.starsCount;

            return `
                <div class="game-card" data-game-id="${game.id}">
                    <div class="card-content">
                        <div class="game-title">
                            <h3>${escapeHtml(game.title)}</h3>
                            <span class="badge-difficulty">${game.difficulty}</span>
                        </div>
                        <div class="game-meta">
                            <span>🎮 ${game.platform}</span>
                            <span>🎭 ${game.genre}</span>
                            <span>📌 ${game.status}</span>
                        </div>
                        <div class="rating-row">
                            <div class="stars">${starSymbols}</div>
                            <div class="rating-value">${game.rating} out of 5</div>
                            <div class="vote-count">⭐ ${formattedStars}+</div>
                        </div>
                        <div class="game-footer">
                            <div class="last-updated">🕒 Updated: ${game.lastUpdated}</div>
                            <div class="action-buttons">
                                <button class="edit-btn" data-id="${game.id}">Edit</button>
                                <button class="delete-btn" data-id="${game.id}">Delete</button>
                            </div>
                        </div>
                    </div>
                </div>
            `;
        }).join('');

        gridContainer.innerHTML = cardsHtml;

        // attach event listeners for edit/delete dynamically
        document.querySelectorAll('.edit-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                e.stopPropagation();
                const gameId = parseInt(btn.getAttribute('data-id'));
                const game = gamesData.find(g => g.id === gameId);
                if (game) {
                    const newTitle = prompt('Edit game title:', game.title);
                    if (newTitle && newTitle.trim()) game.title = newTitle.trim();
                    const newRating = prompt('Edit rating (1-5):', game.rating);
                    if (newRating && !isNaN(parseFloat(newRating)) && parseFloat(newRating)>=0 && parseFloat(newRating)<=5) {
                        game.rating = parseFloat(parseFloat(newRating).toFixed(1));
                        game.ratingValue = game.rating;
                    }
                    renderGameGrid(); // re-render after edit
                }
            });
        });

        document.querySelectorAll('.delete-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                e.stopPropagation();
                const gameId = parseInt(btn.getAttribute('data-id'));
                const index = gamesData.findIndex(g => g.id === gameId);
                if (index !== -1) {
                    if (confirm(`Delete "${gamesData[index].title}" from library?`)) {
                        gamesData.splice(index, 1);
                        renderGameGrid();
                    }
                }
            });
        });
    }

    // simple XSS protection
    function escapeHtml(str) {
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        }).replace(/[\uD800-\uDBFF][\uDC00-\uDFFF]/g, function(c) {
            return c;
        });
    }

    // attach filter event listeners
    function bindFilters() {
        const searchInput = document.getElementById('searchInput');
        const platformSelect = document.getElementById('platformFilter');
        const ratingSelect = document.getElementById('ratingFilter');
        const statusSelect = document.getElementById('statusFilter');

        const update = () => renderGameGrid();
        searchInput.addEventListener('input', update);
        platformSelect.addEventListener('change', update);
        ratingSelect.addEventListener('change', update);
        statusSelect.addEventListener('change', update);
    }

    // init
    function init() {
        bindFilters();
        renderGameGrid();
    }

    init();
</script>
</body>
</html>
