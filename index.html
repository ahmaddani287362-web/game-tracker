<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>GameVault | Premium Game Tracker</title>
    
    <!-- Favicon - Fix 404 Error -->
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎮</text></svg>">
    
    <!-- Font Awesome 6 (Free) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    
    <!-- Google Fonts: Inter & Outfit -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    
    <!-- Supabase JS - Version Stable -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.0/dist/umd/supabase.min.js"></script>
    
    <link rel="stylesheet" href="style.css">
</head>
<body class="light-mode">
    <div class="app-container">
        <!-- Sidebar / Nav Premium -->
        <aside class="sidebar">
            <div class="logo-area">
                <i class="fas fa-dice-d6"></i>
                <span>GameVault</span>
            </div>
            <nav class="nav-menu">
                <a href="#" class="nav-link active" data-tab="dashboard">
                    <i class="fas fa-chart-pie"></i> 
                    <span>Dashboard</span>
                </a>
                <a href="#" class="nav-link" data-tab="library">
                    <i class="fas fa-gamepad"></i> 
                    <span>My Library</span>
                </a>
            </nav>
            <div class="dark-mode-toggle">
                <i class="fas fa-moon"></i>
                <label class="switch">
                    <input type="checkbox" id="darkModeToggle">
                    <span class="slider round"></span>
                </label>
                <i class="fas fa-sun"></i>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <!-- Header -->
            <header class="content-header">
                <h1 id="pageTitle">Dashboard</h1>
                <button id="addGameBtn" class="btn-primary">
                    <i class="fas fa-plus"></i> Add Game
                </button>
            </header>

            <!-- DASHBOARD SECTION -->
            <section id="dashboardSection" class="section active">
                <div class="stats-grid">
                    <div class="stat-card">
                        <i class="fas fa-gamepad"></i>
                        <div>
                            <h3>Total Games</h3>
                            <p id="totalGames">0</p>
                        </div>
                    </div>
                    <div class="stat-card">
                        <i class="fas fa-trophy"></i>
                        <div>
                            <h3>Completed</h3>
                            <p id="completedGames">0</p>
                        </div>
                    </div>
                    <div class="stat-card">
                        <i class="fas fa-clock"></i>
                        <div>
                            <h3>Total Hours</h3>
                            <p id="totalHours">0</p>
                        </div>
                    </div>
                    <div class="stat-card">
                        <i class="fas fa-star"></i>
                        <div>
                            <h3>Avg Rating</h3>
                            <p id="avgRating">0.0</p>
                        </div>
                    </div>
                </div>

                <div class="charts-row">
                    <div class="chart-card">
                        <canvas id="genreChart"></canvas>
                        <h4>Top Genres</h4>
                    </div>
                    <div class="chart-card">
                        <canvas id="completionChart"></canvas>
                        <h4>Completion Status</h4>
                    </div>
                    <div class="chart-card">
                        <canvas id="ratingChart"></canvas>
                        <h4>Rating Distribution</h4>
                    </div>
                </div>
            </section>

            <!-- LIBRARY SECTION -->
            <section id="librarySection" class="section">
                <div class="filter-bar">
                    <div class="search-box">
                        <i class="fas fa-search"></i>
                        <input type="text" id="searchInput" placeholder="Search title...">
                    </div>
                    <select id="filterGenre">
                        <option value="">All Genres</option>
                    </select>
                    <select id="filterPlatform">
                        <option value="">All Platforms</option>
                    </select>
                    <select id="filterRating">
                        <option value="">All Ratings</option>
                        <option value="5">5★ Only</option>
                        <option value="4">4★ & Up</option>
                        <option value="3">3★ & Up</option>
                    </select>
                    <select id="filterStatus">
                        <option value="">All Status</option>
                        <option value="completed">Completed</option>
                        <option value="playing">Playing</option>
                        <option value="backlog">Backlog</option>
                    </select>
                </div>
                <div id="gamesGrid" class="games-grid">
                    <!-- Game cards akan di-render di sini -->
                </div>
            </section>
        </main>
    </div>

    <!-- MODAL ADD/EDIT GAME -->
    <div id="gameModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="modalTitle">Add New Game</h3>
                <span class="close-modal">&times;</span>
            </div>
            <form id="gameForm">
                <input type="hidden" id="gameId">
                <div class="form-group">
                    <label>Game Title *</label>
                    <input type="text" id="title" required placeholder="e.g., The Witcher 3">
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>Platform</label>
                        <input type="text" id="platform" placeholder="PC, PS5, Xbox, Switch">
                    </div>
                    <div class="form-group">
                        <label>Genre</label>
                        <input type="text" id="genre" placeholder="Action, RPG, Adventure">
                    </div>
                </div>
                <div class="form-group">
                    <label>Tags (comma separated)</label>
                    <input type="text" id="tags" placeholder="story-rich, open-world, indie">
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>Progress (%)</label>
                        <input type="number" id="progress" min="0" max="100" value="0">
                    </div>
                    <div class="form-group">
                        <label>Rating (1-5)</label>
                        <input type="number" id="rating" step="0.5" min="1" max="5" value="3">
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>Hours Played</label>
                        <input type="number" id="hours_played" step="0.5" value="0">
                    </div>
                    <div class="form-group">
                        <label>Status</label>
                        <select id="status">
                            <option value="backlog">📚 Backlog</option>
                            <option value="playing">🎮 Playing</option>
                            <option value="completed">🏆 Completed</option>
                        </select>
                    </div>
                </div>
                <button type="submit" class="btn-primary full">💾 Save Game</button>
            </form>
        </div>
    </div>

    <!-- DELETE CONFIRMATION MODAL -->
    <div id="deleteModal" class="modal">
        <div class="modal-content small">
            <h3>🗑️ Confirm Delete</h3>
            <p>Are you sure you want to delete this game?</p>
            <div class="modal-buttons">
                <button id="confirmDeleteBtn" class="btn-danger">Delete</button>
                <button id="cancelDeleteBtn" class="btn-secondary">Cancel</button>
            </div>
        </div>
    </div>

    <!-- Environment Variables -->
    <script>
        // Supabase credentials (sudah diisi dengan data Anda)
        window.SUPABASE_URL = 'https://inwjlxiqxtztjtrttqke.supabase.co';
        window.SUPABASE_KEY = 'sb_publishable_ntFp5P_qMnQKQSv3-MX9RA_dgOit_H1';
        console.log('✅ Environment variables loaded');
    </script>
    
    <script src="script.js"></script>
</body>
</html>
